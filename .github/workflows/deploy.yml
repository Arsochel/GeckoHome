name: Deploy

on:
  push:
    branches: [main]

env:
  PROJECT_DIR: ${{ vars.PROJECT_DIR }}

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          $dir = "$env:PROJECT_DIR".Trim()
          $gitCmd = (where.exe git 2>$null | Select-Object -First 1)
          if (-not $gitCmd) { $gitCmd = "C:\Program Files\Git\cmd\git.exe" }
          & $gitCmd config --global --add safe.directory ($dir -replace '\\','/')
          Set-Location $dir
          & $gitCmd pull origin main

      - name: Deploy with Docker Compose
        timeout-minutes: 15
        run: |
          $dir = "$env:PROJECT_DIR".Trim()
          $wslDir = "/mnt/" + ($dir[0].ToString().ToLower()) + "/" + ($dir.Substring(3) -replace '\\', '/')
          Write-Host "WSL dir: $wslDir"
          Write-Host "Testing WSL..."
          wsl -d Ubuntu -u root -- bash -c "echo 'WSL OK'; docker --version; service docker start 2>&1 || true"
          Write-Host "WSL exit code: $LASTEXITCODE"
          Write-Host "Running docker compose..."
          wsl -d Ubuntu -u root -- bash -c "cd $wslDir && docker compose up --build -d 2>&1"
          Write-Host "Docker compose exit code: $LASTEXITCODE"

name: CI

on:
  pull_request:
  push:
    branches-ignore: [main] # main triggers Deploy; everything else gets CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Pinned to keep `format --check` byte-compatible with local runs.
      - run: pip install ruff==0.15.17
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: System libraries for OpenCV / ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0 ffmpeg
      - name: Install CPU torch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install project + dev deps
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true # informational until the codebase is fully typed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mypy pydantic pydantic-settings
      - name: Mypy (typed modules)
        run: mypy src/geckohome/config.py src/geckohome/paths.py

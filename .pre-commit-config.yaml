# Run `pre-commit install` once after `pip install -e ".[dev]"`.
# ruff/mypy are invoked from the active environment (single source of truth:
# pyproject.toml dev extras), so there is no external tool version to keep in sync.
minimum_pre_commit_version: "3.8.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-added-large-files
        args: ["--maxkb=2048"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        args: ["."]

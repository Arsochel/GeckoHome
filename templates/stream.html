<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🦎 Gecko Cam</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #v, #mjpeg {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #mjpeg {
            display: none;
        }
        #overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-family: sans-serif; font-size: 16px;
            background: rgba(0,0,0,0.6);
            pointer-events: none;
        }
        #overlay.hidden { display: none; }
    </style>
</head>
<body>
    <video id="v" autoplay muted playsinline></video>
    <img id="mjpeg" alt="stream">
    <div id="overlay">Подключение...</div>
    <script>
    const v = document.getElementById('v');
    const mjpeg = document.getElementById('mjpeg');
    const overlay = document.getElementById('overlay');
    const base = window.location.origin;

    function connectMJPEG() {
        v.style.display = 'none';
        mjpeg.style.display = 'block';
        mjpeg.src = base + '/api/stream/live.mjpeg';
        mjpeg.onload = () => overlay.classList.add('hidden');
        mjpeg.onerror = () => {
            overlay.classList.remove('hidden');
            overlay.textContent = 'Нет сигнала';
            setTimeout(() => { mjpeg.src = base + '/api/stream/live.mjpeg?' + Date.now(); }, 3000);
        };
    }

    function connect() {
        connectMJPEG();
    }

    connect();

    if (window.Telegram?.WebApp?.initData) {
        fetch(base + '/api/stream/view', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({initData: window.Telegram.WebApp.initData}),
        }).catch(() => {});
    }
    </script>
</body>
</html>

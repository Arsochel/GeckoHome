<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🦎 Gecko Cam</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #v, #mjpeg {
            position: absolute;
            top: 50%; left: 50%;
            object-fit: contain;
            transform: translate(-50%, -50%);
        }
        #v {
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
        }
        #mjpeg {
            width: 100%;
            height: 100%;
            display: none;
        }
        #overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-family: sans-serif; font-size: 16px;
            background: rgba(0,0,0,0.6);
            pointer-events: none;
        }
        #overlay.hidden { display: none; }
    </style>
</head>
<body>
    <video id="v" autoplay muted playsinline></video>
    <img id="mjpeg" alt="stream">
    <div id="overlay">Подключение...</div>
    <script>
    const v = document.getElementById('v');
    const mjpeg = document.getElementById('mjpeg');
    const overlay = document.getElementById('overlay');
    const base = window.location.origin;

    async function connectWebRTC() {
        const pc = new RTCPeerConnection();
        return new Promise(async (resolve, reject) => {
            pc.ontrack = e => {
                v.srcObject = e.streams[0];
                overlay.classList.add('hidden');
                resolve();
            };
            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });
            await pc.setLocalDescription();
            const r = await fetch(base + '/api/stream/whep', {
                method: 'POST',
                headers: { 'Content-Type': 'application/sdp' },
                body: pc.localDescription.sdp,
            });
            if (!r.ok) { pc.close(); reject(new Error('whep ' + r.status)); return; }
            await pc.setRemoteDescription({ type: 'answer', sdp: await r.text() });
            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    pc.close();
                    reject(new Error('disconnected'));
                }
            };
            setTimeout(() => {
                if (pc.connectionState !== 'connected') {
                    pc.close();
                    reject(new Error('timeout'));
                }
            }, 5000);
        });
    }

    function connectHLS() {
        return new Promise((resolve, reject) => {
            const src = base + '/hls/stream.m3u8';
            if (Hls.isSupported()) {
                const hls = new Hls({ lowLatencyMode: true });
                hls.loadSource(src);
                hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    v.play();
                    overlay.classList.add('hidden');
                    resolve();
                });
                hls.on(Hls.Events.ERROR, (_, data) => {
                    if (data.fatal) { hls.destroy(); reject(new Error('hls ' + data.details)); }
                });
                setTimeout(() => reject(new Error('hls timeout')), 8000);
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = src;
                v.addEventListener('loadedmetadata', () => { v.play(); overlay.classList.add('hidden'); resolve(); }, { once: true });
                v.addEventListener('error', () => reject(new Error('hls native error')), { once: true });
                setTimeout(() => reject(new Error('hls timeout')), 8000);
            } else {
                reject(new Error('hls not supported'));
            }
        });
    }

    function connectMJPEG() {
        v.style.display = 'none';
        mjpeg.style.display = 'block';
        mjpeg.src = base + '/api/stream/live.mjpeg';
        mjpeg.onload = () => overlay.classList.add('hidden');
        mjpeg.onerror = () => {
            overlay.classList.remove('hidden');
            overlay.textContent = 'Нет сигнала';
            setTimeout(() => { mjpeg.src = base + '/api/stream/live.mjpeg?' + Date.now(); }, 3000);
        };
    }

    async function connect() {
        try { await connectWebRTC(); return; } catch(e) {}
        try { await connectHLS(); return; } catch(e) {}
        connectMJPEG();
    }

    connect();

    if (window.Telegram?.WebApp?.initData) {
        fetch(base + '/api/stream/view', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({initData: window.Telegram.WebApp.initData}),
        }).catch(() => {});
    }
    </script>
</body>
</html>

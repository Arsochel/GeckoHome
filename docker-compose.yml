services:
  app:
    build: .
    command: python main.py
    ports:
      - "${SERVER_PORT:-8000}:8000"
    volumes:
      - .:/app
      - /mnt/e/GeckoTimelapse:/app/timelapse
    env_file: .env
    environment:
      MEDIAMTX_BIN: /usr/local/bin/mediamtx
      YOLO_MODEL_PATH: /app/models/gecko_yolo.pt
      TZ: Europe/Moscow
    restart: unless-stopped

  bot:
    build: .
    command: python bot.py
    volumes:
      - .:/app
      - /mnt/e/GeckoTimelapse:/app/timelapse
    env_file: .env
    environment:
      YOLO_MODEL_PATH: /app/models/gecko_yolo.pt
      TZ: Europe/Moscow
      APP_INTERNAL_URL: http://app:8000
    restart: unless-stopped
    depends_on:
      - app
